<!DOCTYPE html>
<html>
<head>

<title>Customer Churn Prediction</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#6a11cb,#2575fc);
    margin:0;
    padding:0;
}

.container{
    width:80%;
    margin:auto;
    background:white;
    padding:30px;
    margin-top:40px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#333;
}

h3{
    margin-top:30px;
    border-bottom:2px solid #eee;
    padding-bottom:5px;
    color:#444;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.field{
    display:flex;
    flex-direction:column;
}

label{
    font-weight:bold;
    margin-bottom:5px;
}

input,select{
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

input:focus,select:focus{
    outline:none;
    border-color:#2575fc;
}

button{
    width:100%;
    padding:14px;
    margin-top:25px;
    border:none;
    border-radius:8px;
    background:#2575fc;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1a5ed8;
}

.error{
    border:2px solid red !important;
}

</style>

<script>

function validateForm(){

let fields = document.querySelectorAll("input, select");

for(let i=0;i<fields.length;i++){

fields[i].classList.remove("error");

if(fields[i].value.trim() === ""){

alert("⚠ Please fill all the fields before submitting!");

fields[i].classList.add("error");

fields[i].focus();

return false;

}

}

return true;

}

</script>

</head>

<body>

<div class="container">

<h1>Customer Churn Prediction</h1>

<form action="/predict" method="post" onsubmit="return validateForm()">

<h3>Customer Profile</h3>

<div class="form-grid">

<div class="field">
<label>Customer ID</label>
<input type="text" name="customerID">
</div>

<div class="field">
<label>Gender</label>
<select name="gender">
<option value="">Select</option>
<option value="male">Male</option>
<option value="female">Female</option>
</select>
</div>

<div class="field">
<label>Senior Citizen</label>
<select name="SeniorCitizen">
<option value="">Select</option>
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="field">
<label>Partner</label>
<select name="Partner">
<option value="">Select</option>
<option value="yes">Yes</option>
<option value="no">No</option>
</select>
</div>

<div class="field">
<label>Dependents</label>
<select name="Dependents">
<option value="">Select</option>
<option value="yes">Yes</option>
<option value="no">No</option>
</select>
</div>

</div>


<h3>Account Information</h3>

<div class="form-grid">

<div class="field">
<label>Tenure</label>
<input type="number" name="tenure">
</div>

<div class="field">
<label>Contract</label>
<select name="Contract">
<option value="">Select</option>
<option value="month-to-month">Month-to-Month</option>
<option value="one year">One Year</option>
<option value="two year">Two Year</option>
</select>
</div>

<div class="field">
<label>Paperless Billing</label>
<select name="PaperlessBilling">
<option value="">Select</option>
<option value="yes">Yes</option>
<option value="no">No</option>
</select>
</div>

<div class="field">
<label>Payment Method</label>
<select name="PaymentMethod">
<option value="">Select</option>
<option value="electronic check">Electronic Check</option>
<option value="mailed check">Mailed Check</option>
<option value="bank transfer (automatic)">Bank Transfer</option>
<option value="credit card (automatic)">Credit Card</option>
</select>
</div>

</div>


<h3>Services</h3>

<div class="form-grid">

<div class="field">
<label>Phone Service</label>
<select name="PhoneService">
<option value="">Select</option>
<option value="yes">Yes</option>
<option value="no">No</option>
</select>
</div>

<div class="field">
<label>Multiple Lines</label>
<select name="MultipleLines">
<option value="">Select</option>
<option value="yes">Yes</option>
<option value="no">No</option>
<option value="no phone service">No phone service</option>
</select>
</div>

<div class="field">
<label>Internet Service</label>
<select name="InternetService">
<option value="">Select</option>
<option value="dsl">DSL</option>
<option value="fiber optic">Fiber Optic</option>
<option value="no">No</option>
</select>
</div>

<div class="field">
<label>Online Security</label>
<select name="OnlineSecurity">
<option value="">Select</option>
<option value="yes">Yes</option>
<option value="no">No</option>
<option value="no internet service">No Internet Service</option>
</select>
</div>

<div class="field">
<label>Online Backup</label>
<select name="OnlineBackup">
<option value="">Select</option>
<option value="yes">Yes</option>
<option value="no">No</option>
<option value="no internet service">No Internet Service</option>
</select>
</div>

<div class="field">
<label>Device Protection</label>
<select name="DeviceProtection">
<option value="">Select</option>
<option value="yes">Yes</option>
<option value="no">No</option>
<option value="no internet service">No Internet Service</option>
</select>
</div>

<div class="field">
<label>Tech Support</label>
<select name="TechSupport">
<option value="">Select</option>
<option value="yes">Yes</option>
<option value="no">No</option>
<option value="no internet service">No Internet Service</option>
</select>
</div>

<div class="field">
<label>Streaming TV</label>
<select name="StreamingTV">
<option value="">Select</option>
<option value="yes">Yes</option>
<option value="no">No</option>
<option value="no internet service">No Internet Service</option>
</select>
</div>

<div class="field">
<label>Streaming Movies</label>
<select name="StreamingMovies">
<option value="">Select</option>
<option value="yes">Yes</option>
<option value="no">No</option>
<option value="no internet service">No Internet Service</option>
</select>
</div>

</div>


<h3>Billing Information</h3>

<div class="form-grid">

<div class="field">
<label>Monthly Charges</label>
<input type="number" step="0.01" name="MonthlyCharges">
</div>

<div class="field">
<label>Total Charges</label>
<input type="number" step="0.01" name="TotalCharges">
</div>

</div>

<button type="submit">Predict Churn</button>

</form>

{% if prediction %}
<div class="result">
Prediction: {{ prediction }}
</div>
{% endif %}

</div>

</body>
</html>
